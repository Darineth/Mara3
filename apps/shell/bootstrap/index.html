<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mara 3</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        display: grid;
        place-items: center;
        background: #1e1e1e;
        color: #aaa;
        font-family: system-ui, sans-serif;
      }
      .box {
        width: min(420px, 82vw);
        text-align: center;
      }
      .logo {
        width: 200px;
        height: auto;
        display: block;
        margin: 0 auto 0.8rem;
      }
      .title {
        font-size: 1.6rem;
        font-weight: 700;
        color: #e6e6e6;
        margin-bottom: 1.2rem;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        text-align: left;
      }
      label {
        font-size: 0.8rem;
        opacity: 0.7;
      }
      input {
        padding: 0.6rem 0.7rem;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        background: #262626;
        color: #e6e6e6;
        font-size: 0.95rem;
      }
      input:focus {
        outline: none;
        border-color: #7aa2f7;
      }
      button {
        padding: 0.6rem;
        border: none;
        border-radius: 6px;
        background: #7aa2f7;
        color: #15161e;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      #status {
        min-height: 1.2em;
        font-size: 0.85rem;
        opacity: 0.7;
        text-align: center;
      }
      #status.error {
        color: #f7768e;
        opacity: 1;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.8rem;
        opacity: 0.85;
      }
      .row input {
        width: auto;
        margin: 0;
      }
      /* "Update available" nudge — a non-blocking top bar shown only when the
         configured manifest reports a newer desktop build. */
      #update {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.5rem 0.8rem;
        background: #2a2f45;
        color: #e6e6e6;
        font-size: 0.85rem;
        border-bottom: 1px solid #3a3a3a;
        box-sizing: border-box;
      }
      #update[hidden] {
        display: none;
      }
      #update-text {
        flex: 1;
      }
      #update-link {
        padding: 0.25rem 0.6rem;
        border-radius: 5px;
        background: #7aa2f7;
        color: #15161e;
        font-weight: 600;
        text-decoration: none;
        white-space: nowrap;
      }
      #update-dismiss {
        padding: 0.1rem 0.4rem;
        background: transparent;
        color: #aaa;
        font-size: 1.1rem;
        line-height: 1;
      }
      /* Version + update-check status on one faint line under the form. */
      #appmeta {
        margin: 0.8rem 0 0;
        font-size: 0.75rem;
        opacity: 0.55;
        text-align: center;
      }
      /* Even fainter line showing where logs are written (or that they're off). */
      #logmeta {
        margin: 0.3rem 0 0;
        font-size: 0.72rem;
        opacity: 0.5;
        text-align: center;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div id="update" hidden>
      <span id="update-text"></span>
      <a id="update-link" href="#" role="button">Download</a>
      <button id="update-dismiss" type="button" title="Dismiss" aria-label="Dismiss">×</button>
    </div>
    <div class="box">
      <img class="logo" src="logo.png" alt="Mara 3" />
      <div class="title">Mara 3</div>
      <form id="form">
        <label for="server">Server address</label>
        <input
          id="server"
          name="server"
          list="recent"
          autocomplete="off"
          spellcheck="false"
          placeholder="e.g. chat.example.com"
        />
        <datalist id="recent"></datalist>
        <label class="row"><input id="auto" type="checkbox" /> Auto-connect on launch</label>
        <button id="connect" type="submit">Connect</button>
      </form>
      <p id="status"></p>
      <p id="appmeta"></p>
      <p id="logmeta"></p>
    </div>
    <script>
      // Server picker. Settings live next to the exe (read via the get_settings
      // native command); the user picks/confirms a server, we persist it, then ask
      // Rust to navigate to the live hosted UI. A plain-browser fallback (no Tauri)
      // just navigates directly. `?switch=1` (set by the in-app "Switch server"
      // action) forces the picker even when auto-connect is on.
      const invoke = window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke;
      const forceSwitch = new URLSearchParams(location.search).has('switch');

      const form = document.getElementById('form');
      const input = document.getElementById('server');
      const button = document.getElementById('connect');
      const autoEl = document.getElementById('auto');
      const statusEl = document.getElementById('status');
      const recentEl = document.getElementById('recent');

      function status(text, isError) {
        statusEl.textContent = text;
        statusEl.className = isError ? 'error' : '';
      }

      // Open a URL in the system browser (via the opener plugin) rather than
      // navigating this window; fall back to a new tab in plain-browser mode.
      function openExternal(url) {
        if (invoke) {
          invoke('plugin:opener|open_url', { url }).catch(() => window.open(url, '_blank'));
        } else {
          window.open(url, '_blank');
        }
      }

      // Numeric dotted-version compare: -1 / 0 / 1 for a < / == / > b. Tolerant of
      // missing/extra segments and non-numeric junk (treated as 0).
      function cmpVersion(a, b) {
        const pa = String(a).split('.');
        const pb = String(b).split('.');
        for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
          const d = (parseInt(pa[i], 10) || 0) - (parseInt(pb[i], 10) || 0);
          if (d) return d < 0 ? -1 : 1;
        }
        return 0;
      }

      // The meta line under the form: the client version shown ONCE, plus the live
      // update-check outcome — e.g. "v3.0.0 · Up to date" (not the version twice).
      function setMeta(status) {
        const el = document.getElementById('appmeta');
        if (!el) return;
        const cur = (window.__MARA_UPDATE__ && window.__MARA_UPDATE__.current) || '';
        el.textContent = [cur ? 'v' + cur : '', status].filter(Boolean).join(' · ');
      }

      // Faint line telling the user where this client writes logs (or that logging is
      // off), from the location Rust injects. Purely informational.
      function setLogMeta() {
        const el = document.getElementById('logmeta');
        if (!el) return;
        const info = window.__MARA_LOG__;
        if (info && info.enabled === false) {
          el.textContent = 'Logging disabled';
        } else if (info && info.path) {
          el.textContent = 'Logs: ' + info.path;
          el.title = info.path;
        }
      }

      // If the build was configured with an update-manifest URL, fetch it and show a
      // dismissible "update available" banner when it reports a newer build. Also
      // appends the outcome (checking / up to date / available / failed) to the meta
      // line so the user can see a check ran. Best-effort and isolated: any failure is
      // swallowed so the picker is never disrupted. This only NOTIFIES — the client
      // stays portable; the Download link opens the system browser.
      async function checkForUpdate() {
        const info = window.__MARA_UPDATE__;
        if (!info || !info.manifestUrl) return; // updates off → leave the bare version
        setMeta('Checking for updates…');
        let manifest;
        try {
          const res = await fetch(info.manifestUrl, { cache: 'no-store' });
          if (!res.ok) throw 0;
          manifest = await res.json();
        } catch {
          return setMeta('Update check failed');
        }
        if (!manifest || !manifest.version) return setMeta('Update check failed');
        if (cmpVersion(manifest.version, info.current) <= 0) return setMeta('Up to date');
        setMeta(`Update available: v${manifest.version}`);

        const notes =
          typeof manifest.notes === 'string' && manifest.notes ? ` ${manifest.notes}` : '';
        document.getElementById('update-text').textContent =
          `Mara 3 ${manifest.version} is available.${notes}`;

        const link = document.getElementById('update-link');
        const url = typeof manifest.url === 'string' ? manifest.url : '';
        if (/^https?:\/\//i.test(url)) {
          link.href = url;
          link.addEventListener('click', (e) => {
            e.preventDefault();
            openExternal(url);
          });
        } else {
          link.hidden = true; // no usable download URL — show the notice without a link
        }

        const bar = document.getElementById('update');
        document.getElementById('update-dismiss').addEventListener('click', () => {
          bar.hidden = true;
        });
        bar.hidden = false;
      }

      // Trim, default the scheme to http://, and ensure exactly one trailing slash.
      // The trailing slash is REQUIRED for a server hosted under a subpath
      // (e.g. https://host/mara/): the loaded page's base URL must end in '/' so the
      // client resolves the ws/upload/asset paths under the subpath, not the domain
      // root. It's harmless for a root server (https://host/).
      function normalize(value) {
        let u = (value || '').trim();
        if (!u) return '';
        if (!/^https?:\/\//i.test(u)) u = 'http://' + u;
        return u.replace(/\/+$/, '') + '/';
      }

      // Opaque, CORS-agnostic reachability probe — resolves if the host answers.
      // Resolve `health` against the (slash-terminated) base so it lands at
      // <base>/health for both root and subpath servers, with no double slash.
      async function reachable(url) {
        try {
          await fetch(new URL('health', url).href, { mode: 'no-cors', cache: 'no-store' });
          return true;
        } catch {
          return false;
        }
      }

      // The webview hides WHY a probe failed (security), but the scheme narrows it down:
      // an https failure is very often an untrusted certificate — the usual Linux gotcha,
      // where the webview validates against the OS trust store (a self-signed/unknown-CA
      // cert that "works" elsewhere is rejected here) — which http can't hit. So point at
      // the likely cause instead of a one-size-fits-all "couldn't reach".
      function unreachableMessage(url) {
        let https = false;
        try {
          https = new URL(url).protocol === 'https:';
        } catch {}
        if (https) {
          return (
            `Couldn't securely connect to ${url}. It may be unreachable, or its HTTPS ` +
            `certificate isn't trusted (self-signed or an unknown authority) — trust the ` +
            `certificate on this machine, or use http:// if the server is unencrypted.`
          );
        }
        return `Couldn't reach ${url}. Check the address and that the server is running.`;
      }

      async function go(url) {
        status('Connected. Loading…');
        if (invoke) {
          await invoke('set_server_url', { url }); // persist the choice
          await invoke('open_app'); // Rust navigates the window (loads remote)
        } else {
          window.location.replace(url);
        }
      }

      // Manual connect (Connect button / Enter): one attempt, surface failures so
      // the user can fix the address.
      let auto = null;
      let cancelled = false;
      async function connectManual() {
        stopAuto();
        const url = normalize(input.value);
        input.value = url;
        if (!url) return status('Enter a server address.', true);
        button.disabled = true;
        status(`Connecting to ${url}…`);
        if (await reachable(url)) {
          await go(url);
        } else {
          button.disabled = false;
          status(unreachableMessage(url), true);
        }
      }

      // On launch, auto-connect to the saved server, retrying until it's reachable
      // — unless the user starts editing the field (then they're choosing one).
      function autoConnect(url) {
        cancelled = false;
        let attempt = 0;
        const tick = async () => {
          if (cancelled) return;
          attempt += 1;
          // Show the live counter while it might just be a server still starting; once
          // it's clearly stuck, surface the likely cause (an untrusted HTTPS cert won't
          // recover by retrying) and keep showing it as we go on retrying.
          if (attempt < 4) status(`Connecting to ${url}… (attempt ${attempt})`);
          if (await reachable(url)) {
            if (!cancelled) await go(url);
          } else if (!cancelled) {
            if (attempt === 3) status(unreachableMessage(url), true);
            auto = setTimeout(tick, 1500);
          }
        };
        tick();
      }
      function stopAuto() {
        cancelled = true;
        if (auto) {
          clearTimeout(auto);
          auto = null;
        }
        button.disabled = false;
      }

      input.addEventListener('focus', stopAuto);
      input.addEventListener('input', stopAuto);
      autoEl.addEventListener('change', () => {
        if (invoke) invoke('set_auto_connect', { enabled: autoEl.checked }).catch(() => {});
        // Turning it off mid-attempt should stop the pending auto-connect and let
        // the user pick; turning it on doesn't yank them away until next launch.
        if (!autoEl.checked) stopAuto();
      });
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        connectManual();
      });

      // Load current settings (authoritative — reflects edits and post-switch
      // state), prefill the form, then decide whether to auto-connect.
      async function init() {
        // Show the client version (under the form + in the titlebar — this overrides
        // the static <title> once the page loads), then fire the update check
        // (fire-and-forget; must not delay the picker or auto-connect).
        const current = (window.__MARA_UPDATE__ && window.__MARA_UPDATE__.current) || '';
        if (current) document.title = 'Mara 3 v' + current;
        setMeta(''); // "v<version>" immediately; checkForUpdate appends the status
        setLogMeta(); // show where logs go (or that they're off)
        checkForUpdate();
        let settings = window.__MARA_SETTINGS__ || {
          serverUrl: '',
          recent: [],
          autoConnect: false,
        };
        if (invoke) {
          try {
            settings = await invoke('get_settings');
          } catch {
            /* keep the injected/default settings */
          }
        }
        input.value = settings.serverUrl || '';
        autoEl.checked = settings.autoConnect !== false;
        recentEl.replaceChildren();
        for (const u of settings.recent || []) {
          const opt = document.createElement('option');
          opt.value = u;
          recentEl.appendChild(opt);
        }
        const url = normalize(settings.serverUrl);
        if (url && settings.autoConnect !== false && !forceSwitch) {
          autoConnect(url);
        } else {
          status('Choose a server, then Connect.');
          input.focus();
        }
      }

      init();
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mara 3</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        display: grid;
        place-items: center;
        background: #1e1e1e;
        color: #aaa;
        font-family: system-ui, sans-serif;
      }
      .box {
        width: min(420px, 82vw);
        text-align: center;
      }
      .logo {
        width: 200px;
        height: auto;
        display: block;
        margin: 0 auto 0.8rem;
      }
      .title {
        font-size: 1.6rem;
        font-weight: 700;
        color: #e6e6e6;
        margin-bottom: 1.2rem;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        text-align: left;
      }
      label {
        font-size: 0.8rem;
        opacity: 0.7;
      }
      input {
        padding: 0.6rem 0.7rem;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        background: #262626;
        color: #e6e6e6;
        font-size: 0.95rem;
      }
      input:focus {
        outline: none;
        border-color: #7aa2f7;
      }
      button {
        padding: 0.6rem;
        border: none;
        border-radius: 6px;
        background: #7aa2f7;
        color: #15161e;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      #status {
        min-height: 1.2em;
        font-size: 0.85rem;
        opacity: 0.7;
        text-align: center;
      }
      #status.error {
        color: #f7768e;
        opacity: 1;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.8rem;
        opacity: 0.85;
      }
      .row input {
        width: auto;
        margin: 0;
      }
      /* "Update available" nudge — a non-blocking top bar shown only when the
         configured manifest reports a newer Win7 build. */
      #update {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.5rem 0.8rem;
        background: #2a2f45;
        color: #e6e6e6;
        font-size: 0.85rem;
        border-bottom: 1px solid #3a3a3a;
        box-sizing: border-box;
      }
      #update[hidden] {
        display: none;
      }
      #update-text {
        flex: 1;
      }
      #update-link {
        padding: 0.25rem 0.6rem;
        border-radius: 5px;
        background: #7aa2f7;
        color: #15161e;
        font-weight: 600;
        text-decoration: none;
        white-space: nowrap;
        cursor: pointer;
      }
      #update-dismiss {
        padding: 0.1rem 0.4rem;
        background: transparent;
        color: #aaa;
        font-size: 1.1rem;
        line-height: 1;
      }
      /* Version + update-check status, shown faint under the form. */
      #appmeta {
        margin: 0.8rem 0 0;
        display: flex;
        flex-direction: column;
        gap: 0.15rem;
        font-size: 0.75rem;
        opacity: 0.55;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="update" hidden>
      <span id="update-text"></span>
      <a id="update-link" href="#" role="button">Download</a>
      <button id="update-dismiss" type="button" title="Dismiss" aria-label="Dismiss">×</button>
    </div>
    <div class="box">
      <img class="logo" src="logo.png" alt="Mara 3" />
      <div class="title">Mara 3</div>
      <form id="form">
        <label for="server">Server address</label>
        <input
          id="server"
          name="server"
          list="recent"
          autocomplete="off"
          spellcheck="false"
          placeholder="e.g. chat.example.com"
        />
        <datalist id="recent"></datalist>
        <label class="row"><input id="auto" type="checkbox" /> Auto-connect on launch</label>
        <button id="connect" type="submit">Connect</button>
      </form>
      <p id="status"></p>
      <p id="appmeta"><span id="appver"></span><span id="upd-status"></span></p>
    </div>
    <script>
      // Server picker for the legacy (Tauri 1) shell. Mirrors the modern shell, but
      // resolves invoke across Tauri versions: v1 exposes window.__TAURI__.tauri.invoke
      // (or .invoke), v2 uses window.__TAURI__.core.invoke. Settings persist next to
      // the exe via native commands; a plain-browser fallback navigates directly.
      const T = window.__TAURI__;
      const invoke =
        (T && ((T.core && T.core.invoke) || (T.tauri && T.tauri.invoke) || T.invoke)) || null;

      const form = document.getElementById('form');
      const input = document.getElementById('server');
      const button = document.getElementById('connect');
      const autoEl = document.getElementById('auto');
      const statusEl = document.getElementById('status');
      const recentEl = document.getElementById('recent');

      function status(text, isError) {
        statusEl.textContent = text;
        statusEl.className = isError ? 'error' : '';
      }

      // Open a URL in the system browser. Tauri 1 exposes shell.open (the shell.open
      // allowlist is enabled in tauri.conf.json); fall back to window.open otherwise.
      function openExternal(url) {
        if (T && T.shell && typeof T.shell.open === 'function') {
          Promise.resolve(T.shell.open(url)).catch(() => window.open(url, '_blank'));
        } else {
          window.open(url, '_blank');
        }
      }

      // Numeric dotted-version compare: -1 / 0 / 1 for a < / == / > b. Tolerant of
      // missing/extra segments and non-numeric junk (treated as 0).
      function cmpVersion(a, b) {
        const pa = String(a).split('.');
        const pb = String(b).split('.');
        for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
          const d = (parseInt(pa[i], 10) || 0) - (parseInt(pb[i], 10) || 0);
          if (d) return d < 0 ? -1 : 1;
        }
        return 0;
      }

      // If built with an update-manifest URL, fetch it and show a dismissible "update
      // available" banner when it reports a newer Win7 build. Best-effort and isolated:
      // any network/parse failure is swallowed so the picker is never disrupted. This
      // only NOTIFIES — the client stays a portable exe; Download opens the system
      // browser. (The host must serve latest-windows7-x64.json with CORS allowing this origin.)
      async function checkForUpdate() {
        const info = window.__MARA_UPDATE__;
        const out = document.getElementById('upd-status');
        const setStatus = (t) => {
          if (out) out.textContent = t;
        };
        if (!info || !info.manifestUrl) return setStatus('Update check off');
        setStatus('Checking for updates…');
        let manifest;
        try {
          const res = await fetch(info.manifestUrl, { cache: 'no-store' });
          if (!res.ok) throw 0;
          manifest = await res.json();
        } catch {
          return setStatus('Update check failed');
        }
        if (!manifest || !manifest.version) return setStatus('Update check failed');
        if (cmpVersion(manifest.version, info.current) <= 0) {
          return setStatus(`Up to date (v${info.current})`);
        }
        setStatus(`Update available: v${manifest.version}`);

        const notes =
          typeof manifest.notes === 'string' && manifest.notes ? ` ${manifest.notes}` : '';
        document.getElementById('update-text').textContent =
          `Mara 3 (Windows 7) ${manifest.version} is available.${notes}`;

        const link = document.getElementById('update-link');
        const url = typeof manifest.url === 'string' ? manifest.url : '';
        if (/^https?:\/\//i.test(url)) {
          link.href = url;
          link.addEventListener('click', (e) => {
            e.preventDefault();
            openExternal(url);
          });
        } else {
          link.hidden = true;
        }

        const bar = document.getElementById('update');
        document.getElementById('update-dismiss').addEventListener('click', () => {
          bar.hidden = true;
        });
        bar.hidden = false;
      }

      // Ensure exactly one trailing slash: required for a server hosted under a
      // subpath (https://host/mara/) so the loaded page's base URL resolves the
      // ws/upload/asset paths under the subpath; harmless for a root server.
      function normalize(value) {
        let u = (value || '').trim();
        if (!u) return '';
        if (!/^https?:\/\//i.test(u)) u = 'http://' + u;
        return u.replace(/\/+$/, '') + '/';
      }

      async function reachable(url) {
        try {
          await fetch(new URL('health', url).href, { mode: 'no-cors', cache: 'no-store' });
          return true;
        } catch {
          return false;
        }
      }

      async function go(url) {
        status('Connected. Loading…');
        if (invoke) {
          await invoke('set_server_url', { url });
          await invoke('open_app');
        } else {
          window.location.replace(url);
        }
      }

      let auto = null;
      let cancelled = false;
      function stopAuto() {
        cancelled = true;
        if (auto) {
          clearTimeout(auto);
          auto = null;
        }
        button.disabled = false;
      }

      async function connectManual() {
        stopAuto();
        const url = normalize(input.value);
        input.value = url;
        if (!url) return status('Enter a server address.', true);
        button.disabled = true;
        status(`Connecting to ${url}…`);
        if (await reachable(url)) {
          await go(url);
        } else {
          button.disabled = false;
          status(`Couldn't reach ${url}. Check the address and that the server is running.`, true);
        }
      }

      function autoConnect(url) {
        cancelled = false;
        let attempt = 0;
        const tick = async () => {
          if (cancelled) return;
          attempt += 1;
          status(`Connecting to ${url}… (attempt ${attempt})`);
          if (await reachable(url)) {
            if (!cancelled) await go(url);
          } else if (!cancelled) {
            auto = setTimeout(tick, 1500);
          }
        };
        tick();
      }

      input.addEventListener('focus', stopAuto);
      input.addEventListener('input', stopAuto);
      autoEl.addEventListener('change', () => {
        if (invoke) invoke('set_auto_connect', { enabled: autoEl.checked }).catch(() => {});
        if (!autoEl.checked) stopAuto();
      });
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        connectManual();
      });

      async function init() {
        // Show the client version (under the form + in the titlebar — this overrides
        // the static <title> once the page loads), then fire the update check
        // (fire-and-forget; must not delay the picker or auto-connect).
        const current = (window.__MARA_UPDATE__ && window.__MARA_UPDATE__.current) || '';
        if (current) {
          document.getElementById('appver').textContent = 'v' + current;
          document.title = 'Mara 3 v' + current;
        }
        checkForUpdate();
        let settings = window.__MARA_SETTINGS__ || {
          serverUrl: '',
          recent: [],
          autoConnect: false,
        };
        if (invoke) {
          try {
            settings = await invoke('get_settings');
          } catch {
            /* keep injected/default settings */
          }
        }
        input.value = settings.serverUrl || '';
        autoEl.checked = settings.autoConnect !== false;
        recentEl.replaceChildren();
        for (const u of settings.recent || []) {
          const opt = document.createElement('option');
          opt.value = u;
          recentEl.appendChild(opt);
        }
        const url = normalize(settings.serverUrl);
        if (url && settings.autoConnect !== false) {
          autoConnect(url);
        } else {
          status('Choose a server, then Connect.');
          input.focus();
        }
      }

      init();
    </script>
  </body>
</html>
